<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4cb8e0">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TicTacToe: Aqua XO</title>
    <meta
        name="description"
        content="TicTacToe: Aqua XO is a glassy water-themed take on the classic game, with solo play, two-player matches, local statistics, and a calm aquatic interface."
    >
    <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="home">
    <div class="page-shell">
        <main>
            <section class="hero-section">
                <div class="hero-copy hero-copy--centered">
                    <img
                        class="app-icon app-icon--hero"
                        src="./assets/app-icon.png"
                        alt="TicTacToe Aqua XO app icon"
                    >
                    <div class="brand-lockup brand-lockup--hero" aria-label="TicTacToe Aqua XO">
                        <span class="brand-title">TicTacToe</span>
                        <span class="brand-subtitle">AQUA XO</span>
                    </div>
                    <p class="hero-text">
                        A polished take on Tic-Tac-Toe with fluid motion, solo and two-player modes,
                        finite sets, endless play, local statistics, and a calm aquatic atmosphere.
                    </p>
                    <div class="hero-actions hero-actions--centered">
                        <a
                            class="app-store-badge-link"
                            data-app-store-link
                            href="#"
                            rel="noopener noreferrer"
                            aria-label="Download on the App Store"
                        >
                            <img
                                class="app-store-badge"
                                src="./assets/app-store-badge.svg"
                                alt="Download on the App Store"
                            >
                        </a>
                    </div>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <div class="footer-left">
                <span class="footer-copyright">&copy; 2026 Radu Oprea. All rights reserved.</span>
            </div>
            <div class="footer-right">
                <a href="./privacy.html">Privacy</a>
                <a href="./terms.html">Terms</a>
                <a href="./support.html">Support</a>
            </div>
        </footer>
    </div>

    <script src="./script.js"></script>
</body>
</html>
